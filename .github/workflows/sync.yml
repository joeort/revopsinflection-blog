name: Sync Substack Posts
concurrency: substack-sync

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install html2text python-dateutil

      - name: Run sync script
        run: python sync.py

      - name: Commit and push new posts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Substack Sync Bot"
          git add -A
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync latest Substack posts"
            git push
          fi
